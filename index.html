<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>путь</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="logo.svg" type="image/x-icon">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: var(--bcg);
            padding: 20px;
        }
        img {
            margin-bottom: 15px;
            height: 50px;
        }
        input {
            width: 100%;
            height: 40px;
            background: var(--el);
            border: 0;
            border-radius: 10px;
            box-sizing: border-box;
            padding: 0px 10px 0px 10px;
            outline: none;
        }
        button {
            width: 100%;
            height: 40px;
            margin-top: 30px;
        }
        button {
            display: flex;
            align-items: center; justify-content: center;
            background: var(--el);
            border: 0;
            border-radius: 10px;
            color: var(--textnot);

            &.active { background: var(--accent); color: var(--text); }
        }
    </style>
</head>
<body data-theme="dark">
    <img src="logo.svg" alt="лого">
    <input maxlength="15" id="nameinput" type="text" placeholder="Отображаемое имя">
    <input maxlength="15" id="usernameinput" type="text" placeholder="Юзернейм (@вашеимя)">
    <button id="regbutton">Зарегистрироваться</button>
    <script>
    let canreg = false;

    const SUPABASE_URL = "https://xcowyhnhdpqhegthjmsa.supabase.co";
    const SUPABASE_KEY = atob("ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW5oamIzZDVhRzVvWkhCeGFHVm5kR2hxYlhOaElpd2ljbTlzWlNJNkltRnViMjRpTENKcFlYUWlPakUzTnpNM016WTRPVGtzSW1WNGNDSTZNakE0T1RNeE1qZzVPWDAuV1g3dDZ2cG1yYmhfaFJiME90UWdpa09UUnRNbmZ6anFQUHloWHNaSmhPQQ==");

    const username_input = document.getElementById("usernameinput");
    const name_input = document.getElementById("nameinput");
    const regbutton = document.getElementById("regbutton");

    function checkbutton() {
        if (username_input.value && name_input.value && username_input.value.includes("@") && username_input.value.length > 2 && username_input.value.length < 16 && name_input.value.length < 16) {
            regbutton.classList.add("active");
            canreg = true;
        } else {
            regbutton.classList.remove("active");
            canreg = false;
        }
    }
    setInterval(checkbutton, 50);

    regbutton.addEventListener("click", async () => {
        if (!canreg) return;

        const username = username_input.value.trim();
        const name = name_input.value.trim();

        // Проверяем, занят ли username
        const checkRes = await fetch(
            `${SUPABASE_URL}/rest/v1/profiles?username=eq.${encodeURIComponent(username)}&select=id`,
            { headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } }
        );
        const existing = await checkRes.json();

        if (existing.length > 0) {
            alert("Этот юзернейм уже занят!");
            return;
        }

        // Регистрируем
        const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
            method: "POST",
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json",
                "Prefer": "return=representation"
            },
            body: JSON.stringify({ username, name, avatar: "" })
        });

        if (!insertRes.ok) {
            alert("Ошибка при регистрации!");
            return;
        }

        localStorage.setItem("putname", name);
        localStorage.setItem("putusername", username);
        window.location.href = "avatar_editor.html";
    });

    if (localStorage.getItem("putname") && localStorage.getItem("putusername") && localStorage.getItem("putavatar")) {
        window.location.href = "main.html";
    };
    
    if (!localStorage.getItem("putheme")) localStorage.setItem("putheme", "dark");
    document.body.setAttribute('data-theme', localStorage.getItem("putheme")); 
</script>
</body>
</html>
